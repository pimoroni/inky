name: QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  warning-clean-build:
    name: Warning-clean build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config

      - name: Configure
        env:
          CXXFLAGS: -Wall -Wextra -Wpedantic -Werror
        run: |
          cmake -S . -B build -G Ninja -DINKY_ENABLE_LINUX_GPIOD=OFF

      - name: Build
        run: |
          cmake --build build
