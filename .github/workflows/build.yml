name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang pkg-config

      - name: Configure
        env:
          CXX: ${{ matrix.compiler }}
        run: |
          cmake -S . -B build -G Ninja -DINKY_ENABLE_LINUX_GPIOD=OFF

      - name: Build
        run: |
          cmake --build build
